<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orbit Insights Subscription</title>
  <style>
    :root {
      --dark-bg: #0f0f0f;
      --accent: #00f2f2;
      --text: #cccccc;
      --placeholder: #555;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--dark-bg);
      font-family: 'Segoe UI', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
    }

    .star.slow {
      animation: twinkle-slow 3s infinite alternate;
    }

    .star.medium {
      animation: twinkle-medium 2s infinite alternate;
    }

    .star.fast {
      animation: twinkle-fast 1.2s infinite alternate;
    }

    .star.large {
      width: 3px;
      height: 3px;
    }

    @keyframes twinkle-slow {
      0% { opacity: 0.15; }
      100% { opacity: 0.8; }
    }

    @keyframes twinkle-medium {
      0% { opacity: 0.2; }
      100% { opacity: 0.75; }
    }

    @keyframes twinkle-fast {
      0% { opacity: 0.25; }
      100% { opacity: 0.7; }
    }

    .form-container {
      background: rgba(255, 255, 255, 0.05);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 250, 250, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .form-container h2 {
      margin-bottom: 1.5rem;
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 0.5rem;
      color: #aaa;
    }

    input {
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      background: #1a1a1a;
      color: var(--text);
      font-size: 1rem;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      background: #2a2a2a;
    }

    .form-group::placeholder {
      color: var(--placeholder);
    }

    button {
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #000;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #00e6e6;
    }

    .message {
      margin-top: 1rem;
      font-size: 0.9rem;
      text-align: center;
      padding: 0.5rem;
      border-radius: 6px;
    }

    .success {
      background-color: #00ffcc;
      color: #000;
    }

    .error {
      background-color: #ff6b6b;
      color: #fff;
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="stars">
    <!-- Row 1 (10-20% height) -->
    <div class="star slow" style="top: 10%; left: 5%;"></div>
    <div class="star fast large" style="top: 15%; left: 25%; animation-delay: 0.5s;"></div>
    <div class="star medium" style="top: 12%; left: 45%; animation-delay: 1s;"></div>
    <div class="star slow" style="top: 18%; left: 70%; animation-delay: 1.5s;"></div>
    <div class="star fast" style="top: 10%; left: 85%; animation-delay: 0.2s;"></div>

    <!-- Row 2 (30-50% height) -->
    <div class="star medium" style="top: 35%; left: 15%; animation-delay: 2s;"></div>
    <div class="star slow large" style="top: 40%; left: 35%; animation-delay: 2.5s;"></div>
    <div class="star fast" style="top: 32%; left: 55%; animation-delay: 1.2s;"></div>
    <div class="star medium" style="top: 45%; left: 75%; animation-delay: 0.8s;"></div>
    <div class="star slow" style="top: 38%; left: 90%; animation-delay: 3s;"></div>

    <!-- Row 3 (60-80% height) -->
    <div class="star fast" style="top: 62%; left: 10%; animation-delay: 1.8s;"></div>
    <div class="star medium" style="top: 70%; left: 30%; animation-delay: 2.2s;"></div>
    <div class="star slow large" style="top: 65%; left: 50%; animation-delay: 3.5s;"></div>
    <div class="star fast" style="top: 75%; left: 68%; animation-delay: 0.6s;"></div>
    <div class="star medium" style="top: 60%; left: 85%; animation-delay: 1.4s;"></div>

    <!-- Row 4 (85%+ height) -->
    <div class="star slow" style="top: 88%; left: 20%; animation-delay: 2.8s;"></div>
    <div class="star fast large" style="top: 90%; left: 75%; animation-delay: 0.9s;"></div>
  </div>
  <div class="form-container">
    <h2>Join the Mission</h2>
    <form id="subscribeForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <button type="submit">Subscribe</button>
    </form>
    <div class="message" id="statusMessage"></div>
  </div>
  <script>
    document.getElementById('subscribeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('statusMessage');
      
      // Basic client-side validation
      if (!name || !email) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      // Submit to the subscriber signup endpoint
      fetch('https://orbit-insights-webhook.onrender.com/subscribe', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email })
      })
      .then(response => {
        if (response.ok) {
          showMessage('Thank you for joining the mission! 🚀', 'success');
          document.getElementById('subscribeForm').reset();
        } else {
          showMessage('Submission failed. Please try again.', 'error');
        }
      })
      .catch(error => {
        showMessage('Network error. Please check your connection.', 'error');
        console.error('Error:', error);
      });
    });

    function showMessage(text, type = 'success') {
      const message = document.getElementById('statusMessage');
      message.textContent = text;
      message.className = `message ${type}`;
      
      // Automatically hide after 5 seconds
      setTimeout(() => {
        message.textContent = '';
        message.className = 'message';
      }, 5000);
    }
  </script>
</body>
</html>
